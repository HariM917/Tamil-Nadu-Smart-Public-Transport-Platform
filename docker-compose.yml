services:
  db:
    image: postgres:15-alpine
    container_name: tn_transport_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tn_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tn_secure_pass_2024}
      POSTGRES_DB: ${POSTGRES_DB:-tn_transport}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tn_admin -d tn_transport"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tn_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tn_transport_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    networks:
      - tn_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tn_transport_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - tn_network

volumes:
  postgres_data:
  backend_uploads:

networks:
  tn_network:
    driver: bridge
